packages:
  - "."

# pnpm 11 gates dependency build scripts behind an explicit allow-list.
# Without this, native deps' build scripts are skipped and pnpm exits with
# ERR_PNPM_IGNORED_BUILDS in CI (e.g. inside withastro/action), which breaks
# the Deploy Docs workflow. es5-ext's script is only a funding notice.
allowBuilds:
  esbuild: true
  sharp: true
  es5-ext: false
